# docker-compose.yml
# Starts a Jenkins controller and an SSH-connected agent that has access to Docker.
#
# Prerequisites:
#   1. Run ./setup-keys.sh to generate an SSH key pair.
#      This creates secrets/agent-private-key, secrets/agent-public-key, and .env.
#   2. docker-compose up -d   (or: podman-compose up -d)
#
# Jenkins UI:  http://localhost:8080

services:

  # ── Jenkins controller ──────────────────────────────────────────────────────
  jenkins:
    build:
      context: .
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # JCasC configuration (read-only)
      - ./casc.yaml:/var/jenkins_home/casc.yaml:ro
      # SSH private key injected as a Docker secret; JCasC reads it via
      # the FileSystemSecretSource (looks in /run/secrets/ by default).
      - ./secrets/agent-private-key:/run/secrets/JENKINS_AGENT_PRIVATE_KEY:ro
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
    networks:
      - jenkins-net

  # ── Jenkins SSH agent ───────────────────────────────────────────────────────
  agent:
    build:
      context: ./agent
      args:
        # The GID of the docker group on your host. This must match the GID of
        # /var/run/docker.sock so the jenkins user inside the container can use
        # the socket. Find it with: stat -c %g /var/run/docker.sock
        # Default 999 is standard on Debian/Ubuntu/Fedora/RHEL hosts.
        - DOCKER_GID=${DOCKER_GID:-999}
    container_name: jenkins-agent
    restart: unless-stopped
    # Public key is read from the .env file generated by setup-keys.sh
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBKEY}
    volumes:
      # Give the agent access to the host Docker socket so jobs can run
      # Docker commands.  For Podman hosts replace with:
      #   /run/podman/podman.sock:/var/run/docker.sock
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net

networks:
  jenkins-net:
    driver: bridge

volumes:
  jenkins_home:
